# Cloudflare Workers — static assets + Steam API proxy + AI Chat
name = "ghostlua"
compatibility_date = "2024-01-01"
main = "worker.js"

# Workers AI binding — enables env.AI in worker
[ai]
binding = "AI"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[vars]
STEAM_API_KEY = "FFCB66298DB13D946E747FDFEBB02FCB"
