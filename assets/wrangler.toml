# Cloudflare Workers — static assets + Steam API proxy + AI Chat
name = "ghostlua"
compatibility_date = "2024-01-01"
main = "worker.js"

# Workers AI binding — enables env.AI in worker
[ai]
binding = "AI"

[assets]
directory = "./assets"
binding = "ASSETS"
run_worker_first = true

# Only include necessary files in assets
[assets.upload]
patterns = ["**/*.html", "**/*.css", "**/*.js", "**/*.json", "**/*.svg", "**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.ico", "**/*.webp"]
exclude_patterns = ["node_modules/**", "server.js", "*.mjs", "data/**", "admin.html"]
